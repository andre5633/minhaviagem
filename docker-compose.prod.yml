# Produção — PostgreSQL EXTERNO via DATABASE_URL, sem container de banco local.
# (Se NÃO tiver banco externo, use docker-compose.full.yml, que sobe o Postgres.)
# Uso: docker compose -f docker-compose.prod.yml --env-file .env up -d --build
# O frontend publica em WEB_PORT (padrão 8080); o nginx do host faz proxy do domínio.

services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL:         ${DATABASE_URL}
      GOOGLE_CLIENT_ID:     ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL:  ${GOOGLE_CALLBACK_URL}
      JWT_SECRET:           ${JWT_SECRET}
      JWT_EXPIRES_IN:       ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL:         ${FRONTEND_URL}
      AWESOMEAPI_TOKEN:     ${AWESOMEAPI_TOKEN:-}
      ADMIN_PASSWORD:       ${ADMIN_PASSWORD:-}
      # Assistente no WhatsApp (opcional — sem isto o app roda sem o agente)
      WHATSAPP_VERIFY_TOKEN:    ${WHATSAPP_VERIFY_TOKEN:-}
      WHATSAPP_APP_SECRET:      ${WHATSAPP_APP_SECRET:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_TOKEN:           ${WHATSAPP_TOKEN:-}
      WHATSAPP_DISPLAY_NUMBER:  ${WHATSAPP_DISPLAY_NUMBER:-}
      ANTHROPIC_API_KEY:        ${ANTHROPIC_API_KEY:-}
      AI_DEFAULT_MONTHLY_MESSAGE_CAP:  ${AI_DEFAULT_MONTHLY_MESSAGE_CAP:-300}
      AI_DEFAULT_MONTHLY_COST_CAP_USD: ${AI_DEFAULT_MONTHLY_COST_CAP_USD:-10}
      PORT:                 4000
      NODE_ENV:             production
    # Porta 4000 não exposta externamente — tráfego passa pelo nginx do frontend
    expose:
      - "4000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - backend
