# Deploy AUTOSSUFICIENTE — sobe Postgres + backend + frontend num servidor novo.
# Tudo é criado no deploy:
#   • as tabelas → migrations rodam no boot do backend (prisma migrate deploy)
#   • os dados padrão (categorias, checklists globais, cotações) → semeados
#     sob demanda no primeiro acesso de cada usuário.
#
# Uso:
#   cp .env.example .env   # preencher; DATABASE_URL deve apontar para @db:5432
#   docker compose -f docker-compose.full.yml --env-file .env up -d --build
#
# O nginx do host faz proxy do(s) domínio(s) → http://localhost:${WEB_PORT}

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL:         ${DATABASE_URL}
      GOOGLE_CLIENT_ID:     ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL:  ${GOOGLE_CALLBACK_URL}
      JWT_SECRET:           ${JWT_SECRET}
      JWT_EXPIRES_IN:       ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL:         ${FRONTEND_URL}
      AWESOMEAPI_TOKEN:     ${AWESOMEAPI_TOKEN:-}
      ADMIN_PASSWORD:       ${ADMIN_PASSWORD:-}
      # Assistente no WhatsApp (opcional — sem isto o app roda sem o agente)
      WHATSAPP_VERIFY_TOKEN:    ${WHATSAPP_VERIFY_TOKEN:-}
      WHATSAPP_APP_SECRET:      ${WHATSAPP_APP_SECRET:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_TOKEN:           ${WHATSAPP_TOKEN:-}
      WHATSAPP_DISPLAY_NUMBER:  ${WHATSAPP_DISPLAY_NUMBER:-}
      ANTHROPIC_API_KEY:        ${ANTHROPIC_API_KEY:-}
      AI_DEFAULT_MONTHLY_MESSAGE_CAP:  ${AI_DEFAULT_MONTHLY_MESSAGE_CAP:-300}
      AI_DEFAULT_MONTHLY_COST_CAP_USD: ${AI_DEFAULT_MONTHLY_COST_CAP_USD:-10}
      PORT:                 4000
      NODE_ENV:             production
    depends_on:
      db:
        condition: service_healthy
    expose:
      - '4000'

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-8080}:80'
    depends_on:
      - backend

volumes:
  pgdata:
