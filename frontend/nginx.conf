server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy para o backend — funciona em dev (docker-compose) e prod (VPS)
    # "backend" é o nome do service no docker-compose.
    # Só /api, /auth e /health vão pro backend; /trips e /expenses são rotas
    # de PÁGINA da SPA e precisam cair no index.html (location / abaixo).
    location ~ ^/(api|auth|health) {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React SPA — redireciona tudo para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
